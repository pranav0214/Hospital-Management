<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management Software — Feature Specification</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f8f8f7;
  --bg3: #f1f0ed;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #111318;
  --muted: #6b7280;
  --muted2: #9ca3af;
  --accent: #2563eb;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg);
  position: relative;
  z-index: 10;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #fff;
  letter-spacing: 0.03em;
}
.logo-text {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  color: var(--text);
  letter-spacing: -0.01em;
}
.logo-text span { color: var(--muted); font-style: italic; }
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 12px;
  width: 260px;
}
.search-box input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  width: 100%;
}
.search-box input::placeholder { color: var(--muted2); }
.search-icon { color: var(--muted); font-size: 14px; flex-shrink: 0; }
.header-stats {
  display: flex;
  gap: 20px;
  padding-left: 16px;
  border-left: 1px solid var(--border);
}
.hstat { text-align: right; }
.hstat-n { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1; }
.hstat-l { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

/* Main */
.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px 0;
  background: var(--bg);
}
.sidebar-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted2);
  padding: 0 20px 10px;
}
.uc-btn {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  cursor: pointer;
  padding: 9px 20px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  border-radius: 0;
  transition: background 0.12s;
  position: relative;
}
.uc-btn:hover { background: var(--bg2); }
.uc-btn.active { background: var(--bg3); }
.uc-btn.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.uc-num {
  width: 20px; height: 20px;
  border-radius: 5px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600;
  color: var(--muted);
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.12s;
}
.uc-btn.active .uc-num {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.uc-info {}
.uc-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  display: block;
}
.uc-btn:not(.active) .uc-title { color: var(--muted); }
.uc-rolecount {
  font-size: 10px;
  color: var(--muted2);
  margin-top: 2px;
  display: block;
}

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 12px 20px;
}

/* Content */
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px 60px;
}

/* UC Header */
.uc-header {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.uc-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  opacity: 0.9;
}
.uc-h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 10px;
}
.uc-desc {
  font-size: 13px;
  color: var(--muted);
  max-width: 600px;
  line-height: 1.7;
}
.uc-meta {
  display: flex;
  gap: 16px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.uc-meta-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  font-size: 11px;
  color: var(--muted);
  background: var(--bg2);
}
.uc-meta-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Role blocks */
.roles-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.role-block {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.role-block:hover { border-color: var(--border2); }
.role-hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  background: var(--bg2);
  transition: background 0.12s;
}
.role-hdr:hover { background: var(--bg3); }
.role-hdr.open { background: var(--bg3); border-bottom: 1px solid var(--border); }
.role-pip {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.role-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}
.role-badge {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.02em;
}
.feat-count {
  font-size: 11px;
  color: var(--muted2);
  margin-left: 4px;
}
.chevron-icon {
  font-size: 9px;
  color: var(--muted2);
  transition: transform 0.18s;
  display: inline-block;
}
.chevron-icon.open { transform: rotate(90deg); }

.role-body {
  display: none;
  padding: 16px 18px 18px;
  background: var(--bg);
}
.role-body.open { display: block; }
.feats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
}
.feat-row {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 7px 10px;
  background: var(--bg2);
  border-radius: 4px;
  font-size: 12px;
  color: #4b5563;
  line-height: 1.5;
  transition: background 0.1s, color 0.1s;
}
.feat-row:hover { background: var(--bg3); color: var(--text); }
.feat-bullet {
  width: 4px; height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 6px;
}

/* Extended badge */
.ext-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  background: rgba(234,179,8,0.12);
  color: #ca8a04;
  border: 1px solid rgba(234,179,8,0.2);
  margin-left: 8px;
}

/* No results */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted2);
  font-size: 13px;
}
.no-results strong { display: block; font-size: 16px; margin-bottom: 6px; color: var(--muted); }

/* Search highlight */
mark {
  background: rgba(37,99,235,0.15);
  color: #1d4ed8;
  border-radius: 2px;
  padding: 0 1px;
}

/* Animations */
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
.uc-header, .role-block { animation: fadeIn 0.2s ease both; }
.role-block:nth-child(1) { animation-delay: 0.02s; }
.role-block:nth-child(2) { animation-delay: 0.05s; }
.role-block:nth-child(3) { animation-delay: 0.08s; }
.role-block:nth-child(4) { animation-delay: 0.11s; }
.role-block:nth-child(5) { animation-delay: 0.14s; }
.role-block:nth-child(6) { animation-delay: 0.17s; }

/* Responsive */
@media (max-width: 900px) {
  .feats-grid { grid-template-columns: 1fr; }
  .sidebar { width: 220px; }
  .content-area { padding: 24px 24px 60px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">HMS</div>
      <div class="logo-text">Hospital Management <span>Software</span></div>
    </div>
    <div class="header-right">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="globalSearch" placeholder="Search features, roles, workflows...">
      </div>
      <div class="header-stats">
        <div class="hstat"><div class="hstat-n" id="statUC">8</div><div class="hstat-l">Workflows</div></div>
        <div class="hstat"><div class="hstat-n" id="statRoles">—</div><div class="hstat-l">Roles</div></div>
        <div class="hstat"><div class="hstat-n" id="statFeats">—</div><div class="hstat-l">Features</div></div>
      </div>
    </div>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar"></nav>

    <!-- Content -->
    <div class="content-area" id="contentArea"></div>
  </div>
</div>

<script>

const usecases = [

      { name: "Doctor", features: ["View today's appointment queue on dashboard","See patient's full history, past visits, allergies before entering room","Review AI-prefilled symptom intake form","Enter chief complaint, record vitals","Write clinical notes in SOAP format","Search and tag ICD-10 diagnosis codes","Write prescription with drug name autocomplete, dosage, frequency, duration","Get real-time drug-drug interaction alert before saving prescription","Get drug-allergy cross-check alert","Refer patient to specialist with notes","Schedule follow-up appointment","Send digital visit summary to patient"] },
      { name: "Pharmacy", features: ["Receive prescription automatically from doctor's system","Verify patient identity at counter","Check drug availability in stock","Show drug-drug and drug-allergy alerts to pharmacist","Dispense medicines and print label","Record partial dispensing if stock is short","Update stock automatically after dispensing","Flag controlled or schedule H drugs for double verification"] },
      { name: "Accounts", features: ["Auto-generate OPD bill with consultation fee and any tests ordered","Apply discounts or waivers with approval","Calculate GST automatically","Accept payment — cash, card, UPI, net banking","Generate and print receipt","Send digital receipt to patient via WhatsApp"] },
    ]
  },
  {

    title: "Emergency / Walk-in patient",
    desc: "Fast-track workflow for emergency patients arriving at the hospital — from rapid registration and triage to doctor assignment and critical alerts.",
    roles: [
      { name: "Reception", features: ["Fast 1-minute registration for emergency walk-ins","Flag case as MLC (medico-legal case) if required","Police intimation log for MLC cases","Unidentified patient management workflow","Check real-time bed availability instantly","Generate triage token and assign severity level","Manage mass casualty batch registration"] },
      { name: "Doctor / Nurse", features: ["AI-assisted triage severity scoring (P1 to P4)","Record vitals quickly on emergency screen","Assign doctor and room immediately","Issue emergency medication orders","Escalate to ICU or OT with one action","Receive ambulance pre-arrival case notes","Broadcast critical alert to receiving team"] },

    roles: [
      { name: "Reception / Doctor", features: ["Initiate admission from OPD consultation or emergency","Select ward, room type, and bed","Assign admitting doctor and department","Capture initial assessment notes","Trigger insurance pre-authorization request at admission"] },
      { name: "Admin", features: ["View real-time bed occupancy across all wards and floors","Manage bed allocation — vacant, occupied, cleaning, reserved","Handle bed transfer requests between wards","View expected discharge list for the day"] },
      { name: "Doctor", features: ["View all admitted patients on dashboard","Write daily ward round notes","Review nursing notes and vitals chart","Order IV fluids, medications, diet","Order lab tests and imaging directly from IPD screen","Request specialist consultant with notes","Write discharge summary with AI-assisted draft"] },
      { name: "Head Nurse (Extended)", features: ["View ward patient list with care priorities","Record vitals at scheduled intervals — BP, temperature, SpO2, GCS","Log medication administration as per MAR (medication administration record)","Monitor IV fluid rate and log","Write nursing progress notes","Document wound care and dressing procedures","Complete shift handover notes in SBAR format","Acknowledge doctor instructions","Log patient call bell or fall incidents","Manage care plan checklist","Coordinate bed cleaning tasks after discharge or transfer","Track room status — dirty, cleaning, ready","Log linen and laundry requests","Assign zone-wise housekeeping tasks","Create and manage patient diet plans based on diagnosis","Handle special diet orders — diabetic, renal, liquid, soft","Send diet orders to kitchen and track compliance"] },

      { name: "Head Nurse (Extended)", features: ["Complete pre-op checklist — patient prep, fasting confirmation, consent","Log instrument and sponge count before and after surgery","Record surgical team members present","Document anaesthesia drugs and doses","Track surgery duration"] },

    desc: "Day-to-day pharmacy operations — stock monitoring, expiry management, reordering, and procurement workflow from request to GRN.",
    roles: [

    roles: [
      { name: "Admin", features: ["View live occupancy, revenue, staff on duty on executive dashboard","Manage all user accounts and role permissions","View audit log of every action by every user","Run custom reports — occupancy, revenue, diagnosis trends, staff performance","Manage NABH accreditation checklist and quality KPIs","Track HAI (hospital-acquired infection) cases","Manage corporate tie-ups and employee health program billing","Oversee grievance complaints with resolution tracking","Manage staff rosters, leave, attendance, and payroll from one panel","Get credential and licence expiry alerts for doctors and staff"] },

let activeUC = 1;
let openRoles = {};
let searchQ = "";

const CANONICAL_ROLES = ["Patient","Reception","Doctor","Pharmacy","Accounts","Lab Technician","Admin","Head Nurse (Extended)"];

function countAll() {
  let feats = 0;
  usecases.forEach(uc => {
    uc.roles.forEach(r => { feats += r.features.length; });
  });
  return { roles: CANONICAL_ROLES.length, feats };
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function matchesSearch(uc, q) {
  if (!q) return true;
  if (uc.title.toLowerCase().includes(q)) return true;
  return uc.roles.some(r =>
    r.name.toLowerCase().includes(q) ||
    r.features.some(f => f.toLowerCase().includes(q))
  );
}

function renderSidebar() {
  const el = document.getElementById("sidebar");
  el.innerHTML = "";

  const lbl = document.createElement("div");
  lbl.className = "sidebar-label";
  lbl.textContent = "Use Cases";
  el.appendChild(lbl);

  usecases.forEach((uc, i) => {
    const matches = matchesSearch(uc, searchQ);
    if (searchQ && !matches) return;

    const btn = document.createElement("button");
    btn.className = "uc-btn" + (activeUC === uc.id ? " active" : "");

    const roleCount = uc.roles.length;
    const featCount = uc.roles.reduce((a, r) => a + r.features.length, 0);

    btn.innerHTML = `
      <div class="uc-num">${uc.id}</div>
      <div class="uc-info">
        <span class="uc-title">${uc.title}</span>
        <span class="uc-rolecount">${roleCount} roles · ${featCount} features</span>
      </div>
    `;
    btn.onclick = () => { activeUC = uc.id; openRoles = {}; renderSidebar(); renderContent(); };
    el.appendChild(btn);

    if (i < usecases.length - 1) {
      const div = document.createElement("div");
      div.style.height = "1px"; div.style.margin = "2px 0";
      el.appendChild(div);
    }
  });
}

function renderContent() {
  const el = document.getElementById("contentArea");
  const uc = usecases.find(u => u.id === activeUC);

  if (!uc) { el.innerHTML = '<div class="no-results"><strong>No results</strong>Try a different search term.</div>'; return; }

  const rolePills = uc.roles.map(r => {
    const m = rm(r.name);
    return `<div class="uc-meta-pill"><div class="uc-meta-dot" style="background:${m.color}"></div>${r.name}</div>`;
  }).join("");

  el.innerHTML = `
    <div class="uc-header">
      <div class="uc-eyebrow">Use Case ${uc.id} of ${usecases.length}</div>
      <h1 class="uc-h1">${uc.title}</h1>
      <p class="uc-desc">${uc.desc}</p>
      <div class="uc-meta">${rolePills}</div>
    </div>
    <div class="roles-list" id="rolesList"></div>
  `;

  const rolesList = document.getElementById("rolesList");
  let anyVisible = false;

  uc.roles.forEach((role, i) => {
    const q = searchQ;
    const filteredFeats = role.features.filter(f =>
      !q || f.toLowerCase().includes(q) || role.name.toLowerCase().includes(q) || uc.title.toLowerCase().includes(q)
    );
    if (q && filteredFeats.length === 0) return;
    anyVisible = true;

    const m = rm(role.name);
    const key = `${activeUC}-${i}`;
    const isOpen = openRoles[key] !== false;
    const isExt = role.name.includes("Extended");

    const block = document.createElement("div");
    block.className = "role-block";

    const hdr = document.createElement("div");
    hdr.className = "role-hdr" + (isOpen ? " open" : "");
    hdr.innerHTML = `
      <div class="role-pip" style="background:${m.color}"></div>
      <div class="role-label">
        ${role.name}
        ${isExt ? '<span class="ext-badge">Phase 2</span>' : ''}
      </div>
      <div class="role-badge" style="background:${m.bg};color:${m.color};border:1px solid ${m.border}">
        ${filteredFeats.length} features
      </div>
      <span class="chevron-icon ${isOpen ? 'open' : ''}">&#9654;</span>
    `;
    hdr.onclick = () => {
      openRoles[key] = !isOpen;
      renderContent();
    };

    const body = document.createElement("div");
    body.className = "role-body" + (isOpen ? " open" : "");

    const grid = document.createElement("div");
    grid.className = "feats-grid";

    filteredFeats.forEach(f => {
      const row = document.createElement("div");
      row.className = "feat-row";
      row.innerHTML = `
        <div class="feat-bullet" style="background:${m.color}"></div>
        <span>${highlight(f, q)}</span>
      `;
      grid.appendChild(row);
    });

    body.appendChild(grid);
    block.appendChild(hdr);
    block.appendChild(body);
    rolesList.appendChild(block);
  });

  if (!anyVisible) {
    rolesList.innerHTML = '<div class="no-results"><strong>No matches</strong>No features match your search in this workflow.</div>';
  }
}

function init() {
  const { roles, feats } = countAll();
  document.getElementById("statRoles").textContent = roles;
  document.getElementById("statFeats").textContent = feats;

  renderSidebar();
  renderContent();

  document.getElementById("globalSearch").addEventListener("input", e => {
    searchQ = e.target.value.toLowerCase().trim();
    if (searchQ) {
      const firstMatch = usecases.find(uc => matchesSearch(uc, searchQ));
      if (firstMatch) { activeUC = firstMatch.id; openRoles = {}; }
    }
    renderSidebar();
    renderContent();
  });
}

init();
</script>
</body>
</html>
